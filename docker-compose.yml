version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kdp-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=kdp_author_manager
      - DB_USERNAME=kdp_user
      - DB_PASSWORD=kdp_password
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db
    networks:
      - kdp-network
    command: bash -c "
      composer install --no-interaction --prefer-dist &&
      php artisan key:generate --force &&
      php artisan migrate:fresh --seed --force &&
      php artisan storage:link &&
      apache2-foreground
    "

  db:
    image: mysql:8.0
    container_name: kdp-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: kdp_author_manager
      MYSQL_USER: kdp_user
      MYSQL_PASSWORD: kdp_password
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_ROOT_HOST: "%"
    volumes:
      - kdp-mysql:/var/lib/mysql
      - ./kdp_ddl.sql:/docker-entrypoint-initdb.d/kdp_ddl.sql
    networks:
      - kdp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 3s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kdp-pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - db
    networks:
      - kdp-network

volumes:
  kdp-mysql:

networks:
  kdp-network:
    driver: bridge
